# Example secret — DO NOT commit real values. Create the real one out-of-band:
#   kubectl create secret generic mcp-gateway-secrets \
#     --from-literal=MCP_GATEWAY_KEY=sk_... \
#     --from-literal=POSTGRES_DSN=postgres://...
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-secrets
type: Opaque
stringData:
  MCP_GATEWAY_KEY: "sk_change_me"
  # Optional scoped keys (JSON): {"sk_reader":["fs","github"],"sk_admin":["*"]}
  # MCP_GATEWAY_KEYS: '{"sk_reader":["fs","github"]}'
  ADMIN_KEY: ""                 # protects /v1/admin/register and /v1/audit
  POSTGRES_DSN: ""              # postgres://user:pass@host:5432/db
  REDIS_URL: ""                 # redis://host:6379/0 (enables distributed rate-limit)
