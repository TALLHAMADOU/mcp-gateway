connectors:
- description: Local filesystem access (built-in)
  id: fs_local
  type: builtin_fs
# Example remote connector. Disabled by default: the proxy enforces https://
# and rejects private/loopback hosts (SSRF guard), so an internal http host
# like `gitea:3000` would always return 403. Re-enable with a public https URL.
# - description: Example remote git MCP (must be https + publicly resolvable)
#   id: git_remote
#   type: remote
#   url: https://git.example.com
- description: Inkscape local helper (suggested commands)
  handler: inkscape
  id: inkscape_local
  type: builtin
- description: GIMP local helper
  handler: gimp
  id: gimp_local
  type: builtin
- description: Krita local helper
  handler: krita
  id: krita_local
  type: builtin
- description: Synfig local helper
  handler: synfig
  id: synfig_local
  type: builtin
- description: Blender local helper
  handler: blender
  id: blender_local
  type: builtin
- description: Figma API proxy (requires FIGMA_TOKEN)
  handler: figma
  id: figma_local
  type: builtin
- description: Placeholder for Google Stitch (clarify)
  handler: google_stitch
  id: google_stitch
  type: builtin
- description: GitHub API proxy (requires GITHUB_TOKEN)
  handler: github
  id: github
  type: builtin
- description: SQLite query connector (local)
  handler: db
  id: db_sqlite
  type: builtin
- description: Docker daemon access (requires docker socket)
  handler: docker
  id: docker_local
  type: builtin
- description: Chrome DevTools target listing (requires Chrome with --remote-debugging-port=9222)
  handler: chrome_devtools
  id: chrome_devtools
  type: builtin
- description: Notion API proxy (requires NOTION_TOKEN)
  handler: notion
  id: notion
  type: builtin
- description: PostgreSQL read-only connector (uses POSTGRES_DSN or DATABASE_URL env)
  handler: postgres
  id: postgres
  type: builtin
- description: Local DOCX/XLSX/PPTX generation + LibreOffice headless conversion
  handler: office
  id: office_local
  type: builtin
- description: Google Workspace (Drive/Docs/Sheets/Slides) - requires GOOGLE_ACCESS_TOKEN
  handler: google_workspace
  id: google_workspace
  type: builtin
- description: Microsoft 365 via Graph (OneDrive/Word/Excel/PPT) - requires MS_GRAPH_TOKEN
  handler: ms_graph
  id: ms_graph
  type: builtin
- id: example-remote
  type: remote
  url: https://example.com/mcp
